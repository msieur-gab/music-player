<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soniq — Sonic Mix</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: #0e0e10; color: #e8e6e3;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 100;
    }

    #wrap { position: absolute; inset: 0; display: flex; flex-direction: column; }
    .sphere-area { flex: 1; position: relative; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
    canvas:active { cursor: grabbing; }

    /* Top bar */
    .top-bar {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px; border-bottom: 1px solid #1e1e22;
      z-index: 20; flex-shrink: 0;
    }
    .top-bar a { color: #6e6d6a; text-decoration: none; font-size: 13px; transition: color 0.2s; }
    .top-bar a:hover { color: #e8e6e3; }
    .top-bar h1 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 20px; }
    .top-bar .status { font-size: 12px; color: #6e6d6a; margin-left: auto; }

    /* Breadcrumbs */
    #crumbs {
      position: absolute; top: 62px; left: 24px;
      display: flex; align-items: center; gap: 4px; z-index: 20;
    }
    .crumb {
      padding: 5px 12px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px; font-size: 12px; color: #6e6d6a;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 150ms;
    }
    .crumb:hover { background: rgba(255,255,255,0.08); color: #e8e6e3; }
    .crumb.current { color: #aaa; cursor: default; }
    .crumb-sep { color: #2a2a2e; font-size: 11px; }

    /* Tooltip */
    #tip {
      position: absolute; padding: 10px 14px;
      background: rgba(22,22,25,0.95); border: 1px solid #2a2a2e;
      border-radius: 8px; font-size: 12px; color: #e8e6e3;
      pointer-events: none; opacity: 0; transition: opacity 120ms;
      max-width: 240px; z-index: 50; line-height: 1.5;
    }
    #tip.on { opacity: 1; }
    .tip-name { font-weight: 500; margin-bottom: 2px; }
    .tip-meta { color: #6e6d6a; font-size: 11px; }
    .tip-dive { color: #c4704b; font-size: 10px; margin-top: 4px; }

    /* Center label */
    #center-label {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Instrument Serif', serif;
      font-size: 22px; font-weight: 400;
      color: rgba(232,230,227,0);
      pointer-events: none; transition: color 400ms, font-size 400ms;
      white-space: nowrap; z-index: 5;
    }
    #center-label.visible { color: rgba(232,230,227,0.6); }
    #center-label.fade { color: rgba(232,230,227,0); font-size: 16px; }

    .hint {
      position: absolute; bottom: 12px; left: 0; right: 0;
      text-align: center; font-size: 11px; color: #2a2a2e;
      pointer-events: none; z-index: 5;
    }

    /* ---- Playlist panel ---- */
    .playlist-panel {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 380px; background: #131316;
      border-left: 1px solid #1e1e22;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 350ms cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 30;
    }
    .playlist-panel.open { transform: translateX(0); }

    .playlist-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #1e1e22;
    }
    .playlist-header-title {
      font-family: 'Instrument Serif', serif;
      font-size: 18px; font-weight: 400; margin-bottom: 4px;
    }
    .playlist-header-sub { font-size: 12px; color: #6e6d6a; }
    .playlist-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; color: #6e6d6a; font-size: 18px;
      cursor: pointer; padding: 4px 8px; transition: color 0.15s;
    }
    .playlist-close:hover { color: #e8e6e3; }

    .playlist-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .playlist-row {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 20px; cursor: pointer; transition: background 0.15s;
    }
    .playlist-row:hover { background: rgba(255,255,255,0.02); }
    .playlist-row.playing { background: rgba(196,112,75,0.08); }
    .playlist-num {
      width: 22px; text-align: right; font-size: 11px; color: #4a4a4a;
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }
    .playlist-row.playing .playlist-num { color: #c4704b; }
    .playlist-cover {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      object-fit: cover; background: #1e1e22;
    }
    .playlist-info { flex: 1; min-width: 0; }
    .playlist-title {
      font-size: 13px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .playlist-meta {
      font-size: 11px; color: #5a5a58; margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .playlist-score {
      flex-shrink: 0; width: 48px; height: 3px;
      background: #1e1e22; border-radius: 2px; overflow: hidden;
    }
    .playlist-score-fill { height: 100%; background: #c4704b; border-radius: 2px; }
    .playlist-pct {
      flex-shrink: 0; width: 32px; text-align: right;
      font-size: 10px; color: #5a5a58; font-variant-numeric: tabular-nums;
    }
    .playlist-row.seed { background: rgba(196, 112, 75, 0.06); }
    .playlist-seed-tag {
      flex-shrink: 0; font-size: 9px; font-weight: 600;
      letter-spacing: 0.06em; color: #c4704b;
      border: 1px solid rgba(196, 112, 75, 0.3); border-radius: 4px;
      padding: 2px 6px;
    }
    .playlist-empty {
      padding: 40px 20px; text-align: center; color: #3a3a3a;
      font-size: 13px; line-height: 1.6;
    }

    /* Player bar */
    .player-bar {
      display: flex; align-items: center; gap: 12px;
      height: 56px; padding: 0 20px;
      border-top: 1px solid #1e1e22; background: #141416;
      flex-shrink: 0;
    }
    .player-btn {
      background: none; border: none; cursor: pointer;
      color: #888; padding: 4px; transition: color 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .player-btn:hover { color: #e8e6e3; }
    .player-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .player-btn.play-btn svg { width: 24px; height: 24px; }
    .player-track-info { flex: 1; min-width: 0; }
    .player-track-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-track-meta { font-size: 11px; color: #5a5a58; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-seek {
      flex: 1; max-width: 200px;
      -webkit-appearance: none; appearance: none;
      height: 3px; background: #2a2a2e; border-radius: 2px; outline: none; cursor: pointer;
    }
    .player-seek::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: #c4704b; cursor: pointer;
    }
    .player-time { font-size: 11px; color: #5a5a58; font-variant-numeric: tabular-nums; min-width: 70px; text-align: right; }
    .player-idle { font-size: 12px; color: #4a4a4a; }
    .player-playlist-btn {
      background: none; border: 1px solid rgba(196,112,75,0.3); border-radius: 6px;
      color: #c4704b; font-size: 11px; font-weight: 500; letter-spacing: 0.03em;
      padding: 4px 10px; cursor: pointer; white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      display: none;
    }
    .player-playlist-btn:hover { background: rgba(196,112,75,0.08); border-color: rgba(196,112,75,0.5); }
    .player-playlist-btn.visible { display: block; }

    .playlist-list::-webkit-scrollbar { width: 4px; }
    .playlist-list::-webkit-scrollbar-track { background: transparent; }
    .playlist-list::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 2px; }
  </style>
</head>
<body>
<div id="wrap">
  <div class="top-bar">
    <a href="index.html">&larr; Prototypes</a>
    <h1>Sonic Mix</h1>
    <span class="status" id="status">Loading...</span>
  </div>

  <div class="sphere-area" id="sphere-area">
    <canvas id="c"></canvas>
    <div id="crumbs"></div>
    <div id="tip">
      <div class="tip-name" id="tip-name"></div>
      <div class="tip-meta" id="tip-meta"></div>
      <div class="tip-dive" id="tip-dive"></div>
    </div>
    <div id="center-label"></div>
    <div class="hint" id="hint">drag to orbit · pinch to zoom · tap artist to see albums · tap album to generate mix</div>

    <!-- Playlist panel slides over sphere -->
    <div class="playlist-panel" id="playlist-panel">
      <div class="playlist-header">
        <div class="playlist-header-title" id="pl-title">Mix</div>
        <div class="playlist-header-sub" id="pl-sub"></div>
        <button class="playlist-close" id="pl-close">&times;</button>
      </div>
      <div class="playlist-list" id="pl-list">
        <div class="playlist-empty">Select an album to generate a mix</div>
      </div>
    </div>
  </div>

  <div class="player-bar">
    <button class="player-btn" id="prev-btn">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="player-btn play-btn" id="play-btn">
      <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="player-btn" id="next-btn">
      <svg viewBox="0 0 24 24"><path d="M16 18h2V6h-2zM6 18l8.5-6L6 6z"/></svg>
    </button>
    <div class="player-track-info" id="player-info">
      <span class="player-idle">Explore the sphere, tap an album to mix</span>
    </div>
    <input type="range" class="player-seek" id="seek-bar" min="0" max="100" value="0">
    <span class="player-time" id="player-time"></span>
    <button class="player-playlist-btn" id="show-playlist-btn">Playlist</button>
  </div>
</div>

<script>
// ============================================================
// Sonic Mix — sphere-driven playlist generator
//
// Level 1: Artists sphere (edges = similarity)
// Level 2: Artist's albums sphere (edges = sonic similarity)
// Tap album: generates playlist from similar tracks across library
// ============================================================

// ---- Math / Features ----
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function clamp01(v) { return clamp(v || 0, 0, 1); }
function normField(v, min, max) { return v == null || isNaN(v) ? 0 : max === min ? 0.5 : clamp01((v - min) / (max - min)); }

function trackComposite(t, ranges) {
  const n = (f) => normField(t[f], ranges[f]?.min ?? 0, ranges[f]?.max ?? 1);
  return [
    (n('rms_mean') * 1.0 + n('onset_strength') * 0.8 + n('beat_strength') * 0.6 + n('dynamic_range') * 0.4) / 2.8,
    ((1 - n('flatness_mean')) * 1.0 + (1 - n('centroid_mean')) * 0.8 + (1 - n('zcr_mean')) * 0.6) / 2.4,
    (n('beat_strength') * 1.2 + n('tempo') * 0.6 + n('onset_strength') * 0.4) / 2.2,
    (n('mode') * 1.0 + n('centroid_mean') * 0.6 + n('rms_mean') * 0.4) / 2.0,
    (1 - (n('vocal_proxy') || 0)),
    (n('flatness_mean') * 1.0 + n('zcr_mean') * 0.8 + n('spectral_flux') * 0.6) / 2.4,
    (n('dynamic_range') * 1.2 + n('rms_variance') * 0.8 + n('rms_max') * 0.4) / 2.4,
    ((1 - n('onset_strength')) * 1.0 + (1 - n('beat_strength')) * 1.0 + (1 - n('spectral_flux')) * 0.8) / 2.8,
  ];
}

function computeRanges(tracks) {
  const fields = ['rms_mean','onset_strength','beat_strength','dynamic_range','flatness_mean',
    'centroid_mean','zcr_mean','tempo','mode','vocal_proxy','spectral_flux','rms_variance','rms_max'];
  const R = {};
  for (const f of fields) {
    let mn = Infinity, mx = -Infinity;
    for (const t of tracks) { const v = t[f]; if (v != null && !isNaN(v)) { if (v < mn) mn = v; if (v > mx) mx = v; } }
    R[f] = { min: mn === Infinity ? 0 : mn, max: mx === -Infinity ? 1 : mx };
  }
  return R;
}

function vecAvg(vecs) {
  if (!vecs.length) return new Array(8).fill(0);
  const s = new Array(8).fill(0);
  for (const v of vecs) for (let i = 0; i < 8; i++) s[i] += (v[i] || 0);
  return s.map(x => x / vecs.length);
}

function cosSim(a, b) {
  let dot = 0, ma = 0, mb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; ma += a[i] * a[i]; mb += b[i] * b[i]; }
  ma = Math.sqrt(ma); mb = Math.sqrt(mb);
  return (ma && mb) ? clamp(dot / (ma * mb), 0, 1) : 0;
}

// Build full timbre vector for a track (for playlist matching)
function fullTimbreVec(t) {
  const mfcc = t.mfcc_mean_json || [];
  const mfccS = t.mfcc_std_json || [];
  const contrast = t.contrast_mean_json || [];
  const chroma = t.chroma_mean_json || [];
  const tonnetz = t.tonnetz_mean_json || [];
  return [...mfcc, ...mfccS, ...contrast, ...chroma, ...tonnetz];
}

function cosineTimbre(a, b) {
  if (!a.length || a.length !== b.length) return 0;
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
  na = Math.sqrt(na); nb = Math.sqrt(nb);
  return (na && nb) ? dot / (na * nb) : 0;
}

// ---- Data ----
let allTracks = [];
let ranges = {};
let allArtists = [];   // { name, trackCount, albums:[], composite, tracks:[] }
let allAlbums = [];     // { artist, album, tracks:[], composite, timbreCentroid }
let neighborCache = {};
const NEIGHBOR_K = 6;
const EDGE_TOP_K = 3;

function buildData() {
  const grouped = {};
  for (const t of allTracks) {
    const name = t.artist || 'Unknown';
    if (!grouped[name]) grouped[name] = [];
    grouped[name].push(t);
  }

  allArtists = [];
  allAlbums = [];
  for (const [name, tracks] of Object.entries(grouped)) {
    const composites = tracks.map(t => t._composite);
    const albumSet = {};
    for (const t of tracks) {
      const key = t.album || 'Unknown';
      if (!albumSet[key]) albumSet[key] = [];
      albumSet[key].push(t);
    }
    const albumNames = Object.keys(albumSet);
    const albumObjs = [];
    for (const [aName, aTracks] of Object.entries(albumSet)) {
      const aComps = aTracks.map(t => t._composite);
      // Timbre centroid: average full vector for playlist matching
      const timbreVecs = aTracks.map(fullTimbreVec).filter(v => v.length > 0);
      let timbreCentroid = null;
      if (timbreVecs.length) {
        timbreCentroid = timbreVecs[0].map((_, i) =>
          timbreVecs.reduce((s, v) => s + (v[i] || 0), 0) / timbreVecs.length
        );
      }
      const coverUrl = `/music/${encodeURIComponent(name)}/${encodeURIComponent(aName)}/cover.jpg`;
      const obj = {
        artist: name, album: aName,
        tracks: aTracks, composite: vecAvg(aComps),
        timbreCentroid,
        trackCount: aTracks.length,
        coverUrl,
      };
      albumObjs.push(obj);
      allAlbums.push(obj);
    }
    allArtists.push({
      name, trackCount: tracks.length,
      albums: albumObjs,
      composite: vecAvg(composites),
      tracks,
    });
  }
  allArtists.sort((a, b) => a.name.localeCompare(b.name));
}

// Cover image cache
const coverCache = {}; // url -> { img, loaded }
function preloadCover(url) {
  if (coverCache[url]) return coverCache[url];
  const img = new Image();
  const entry = { img, loaded: false };
  img.onload = () => { entry.loaded = true; };
  img.onerror = () => { entry.loaded = false; entry.failed = true; };
  img.src = url;
  coverCache[url] = entry;
  return entry;
}
function preloadAllCovers() {
  for (const a of allAlbums) preloadCover(a.coverUrl);
}

function buildNeighborCache() {
  neighborCache = {};
  for (let i = 0; i < allArtists.length; i++) {
    const sims = [];
    for (let j = 0; j < allArtists.length; j++) {
      if (i === j) continue;
      sims.push({ idx: j, sim: cosSim(allArtists[i].composite, allArtists[j].composite) });
    }
    sims.sort((a, b) => b.sim - a.sim);
    neighborCache[i] = sims.slice(0, NEIGHBOR_K);
  }
}

// ---- Graph builders ----
function buildRootGraph() {
  const children = allArtists.map((a, i) => ({
    id: 'a-' + i, label: a.name,
    artistIdx: i,
    _hasChildren: a.albums.length > 1, // only drill if >1 album
    children: a.albums.length > 1 ? buildAlbumSubgraph(i) : null,
    _isAlbum: false,
    _albumObj: a.albums.length === 1 ? a.albums[0] : null, // single-album = tap generates mix directly
  }));

  const edgeSet = new Set();
  const edges = [];
  for (let i = 0; i < allArtists.length; i++) {
    for (let k = 0; k < Math.min(EDGE_TOP_K, (neighborCache[i] || []).length); k++) {
      const j = neighborCache[i][k].idx;
      const key = Math.min(i, j) + ':' + Math.max(i, j);
      if (!edgeSet.has(key)) { edgeSet.add(key); edges.push([i, j, neighborCache[i][k].sim]); }
    }
  }
  return { id: 'root', label: 'All Artists', children, edges };
}

function buildAlbumSubgraph(artistIdx) {
  const artist = allArtists[artistIdx];
  const albums = artist.albums;
  const children = albums.map((alb, i) => ({
    id: 'alb-' + artistIdx + '-' + i,
    label: alb.album,
    _hasChildren: false,
    _isAlbum: true,
    _albumObj: alb,
    artistIdx,
    children: null,
  }));

  // Edges between albums by composite similarity
  const edges = [];
  for (let i = 0; i < albums.length; i++) {
    for (let j = i + 1; j < albums.length; j++) {
      const sim = cosSim(albums[i].composite, albums[j].composite);
      if (sim > 0.6) edges.push([i, j, sim]);
    }
  }
  return children;
}

// ---- Playlist generation ----
function generateMix(albumObj, limit = 30) {
  // Score ALL tracks (including seed album) against the album's sonic DNA
  const seedArtist = albumObj.artist;
  const seedAlbum = albumObj.album;
  const seedComposite = albumObj.composite;
  const seedTimbre = albumObj.timbreCentroid;

  const candidates = [];
  for (const t of allTracks) {
    const isSeed = t.artist === seedArtist && t.album === seedAlbum;

    // Score: composite similarity + timbre similarity
    const compSim = cosSim(t._composite, seedComposite);
    let timbreSim = 0;
    if (seedTimbre) {
      const tv = fullTimbreVec(t);
      if (tv.length === seedTimbre.length) timbreSim = cosineTimbre(tv, seedTimbre);
    }
    // Weighted blend: 40% composite (high-level feel), 60% timbre (actual sound)
    const score = compSim * 0.4 + timbreSim * 0.6;
    candidates.push({ track: t, score, seed: isSeed });
  }

  candidates.sort((a, b) => b.score - a.score);
  return candidates.slice(0, limit);
}

// ============================================================
// Sphere renderer
// ============================================================
const PHI = (1 + Math.sqrt(5)) / 2;
const PERSP = 800;
const DISSOLVE_MS = 350;
const FORM_MS = 450;
const ACCENT = [196, 112, 75];

let path = [];
let currentNode = null;
let sphereNodes = [], sphereEdges = [], sphereAdj = [];
let animPhase = 'idle', animT = 0;
let rX = -0.2, rY = 0.3, zm = 1;
let drag = false, dragMoved = false, lx = 0, ly = 0;
let mx = -999, my = -999;
let autoRot = true, idleT = null;

const sphereArea = document.getElementById('sphere-area');
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const tip = document.getElementById('tip');
const centerLabel = document.getElementById('center-label');
let W = 300, H = 300, dpr = 1;

function resize() {
  const r = sphereArea.getBoundingClientRect();
  W = r.width || 300; H = r.height || 300;
  dpr = window.devicePixelRatio || 1;
  cvs.width = W * dpr; cvs.height = H * dpr;
  cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
new ResizeObserver(resize).observe(sphereArea);
resize();

function fibSphere(i, count) {
  if (count <= 1) return { x: 0, y: 0, z: 0 };
  const y = 1 - (i / (count - 1)) * 2;
  const r = Math.sqrt(1 - y * y);
  const t = 2 * Math.PI * i / PHI;
  return { x: Math.cos(t) * r, y, z: Math.sin(t) * r };
}

function project(ox, oy, oz, R) {
  const x = ox * R, y = oy * R, z = oz * R;
  const cx2 = x * Math.cos(rY) - z * Math.sin(rY);
  const cz = x * Math.sin(rY) + z * Math.cos(rY);
  const cy2 = y * Math.cos(rX) - cz * Math.sin(rX);
  const cz2 = y * Math.sin(rX) + cz * Math.cos(rX);
  const s = PERSP / (PERSP + cz2) * zm;
  return { sx: W / 2 + cx2 * s, sy: H / 2 + cy2 * s, s, z: cz2 };
}

function buildSphere(node) {
  const children = node.children || [];
  const n = children.length;
  const sorted = children.map((c, i) => ({ idx: i, kids: (c.children || []).length }))
    .sort((a, b) => b.kids - a.kids);
  const rank = new Array(n);
  sorted.forEach((s, pos) => rank[s.idx] = pos);

  const nodes = children.map((c, i) => {
    const tgt = fibSphere(rank[i], n);
    const hasChildren = c._hasChildren !== false && c.children && c.children.length > 0;
    return {
      id: c.id, label: c.label, ref: c,
      hasChildren,
      _isAlbum: c._isAlbum || false,
      _albumObj: c._albumObj || null,
      artistIdx: c.artistIdx,
      cx: tgt.x, cy: tgt.y, cz: tgt.z,
      x: tgt.x, y: tgt.y, z: tgt.z,
      dx: (Math.random()-0.5)*4, dy: (Math.random()-0.5)*4, dz: (Math.random()-0.5)*4,
      fx: tgt.x*3+(Math.random()-0.5), fy: tgt.y*3+(Math.random()-0.5), fz: tgt.z*3+(Math.random()-0.5),
      alpha: 1,
    };
  });

  const rawEdges = (node.edges || []).filter(([a, b]) => a < n && b < n);
  const adj = Array.from({ length: n }, () => new Set());
  rawEdges.forEach(([a, b]) => { adj[a].add(b); adj[b].add(a); });

  return { nodes, edges: rawEdges, adj };
}

// ---- Navigation ----
function enterSphere(node, fromLabel) {
  closeMixPanel();
  animPhase = 'dissolve'; animT = 0;
  const start = performance.now();
  if (fromLabel) {
    centerLabel.textContent = fromLabel;
    centerLabel.classList.remove('fade'); centerLabel.classList.add('visible');
  }

  function dissolve(now) {
    animT = Math.min(1, (now - start) / DISSOLVE_MS);
    const t = 1 - (1 - animT) * (1 - animT);
    for (const n of sphereNodes) {
      n.x = n.cx + (n.dx - n.cx) * t; n.y = n.cy + (n.dy - n.cy) * t;
      n.z = n.cz + (n.dz - n.cz) * t; n.alpha = 1 - t;
    }
    if (animT < 1) requestAnimationFrame(dissolve);
    else { switchTo(node); formNew(fromLabel); }
  }

  if (sphereNodes.length === 0) {
    currentNode = node; path = [node];
    const s = buildSphere(node);
    sphereNodes = s.nodes; sphereEdges = s.edges; sphereAdj = s.adj;
    updateCrumbs();
    for (const n of sphereNodes) { n.x = n.fx; n.y = n.fy; n.z = n.fz; n.alpha = 0; }
    formNew('');
  } else requestAnimationFrame(dissolve);
}

function switchTo(node) {
  currentNode = node; path.push(node);
  const s = buildSphere(node);
  sphereNodes = s.nodes; sphereEdges = s.edges; sphereAdj = s.adj;
  updateCrumbs();
  for (const n of sphereNodes) { n.x = n.fx; n.y = n.fy; n.z = n.fz; n.alpha = 0; }
}

function formNew(label) {
  animPhase = 'form'; animT = 0;
  const start = performance.now();
  if (label) {
    centerLabel.classList.add('fade'); centerLabel.classList.remove('visible');
    setTimeout(() => { centerLabel.textContent = ''; centerLabel.classList.remove('fade'); }, 500);
  }
  function step(now) {
    animT = Math.min(1, (now - start) / FORM_MS);
    const t = 1 - Math.pow(1 - animT, 3);
    for (const n of sphereNodes) {
      n.x = n.fx + (n.cx - n.fx) * t; n.y = n.fy + (n.cy - n.fy) * t;
      n.z = n.fz + (n.cz - n.fz) * t; n.alpha = t;
    }
    if (animT < 1) requestAnimationFrame(step);
    else { for (const n of sphereNodes) { n.x = n.cx; n.y = n.cy; n.z = n.cz; n.alpha = 1; } animPhase = 'idle'; }
  }
  requestAnimationFrame(step);
}

function navigateTo(depth) {
  if (animPhase !== 'idle') return;
  const target = path[depth]; path = path.slice(0, depth);
  enterSphere(target, target.label);
}

// ---- Breadcrumbs ----
const crumbsEl = document.getElementById('crumbs');
function updateCrumbs() {
  crumbsEl.innerHTML = '';
  path.forEach((node, i) => {
    if (i > 0) { const sep = document.createElement('span'); sep.className = 'crumb-sep'; sep.textContent = '›'; crumbsEl.appendChild(sep); }
    const btn = document.createElement('button');
    btn.className = 'crumb' + (i === path.length - 1 ? ' current' : '');
    btn.textContent = i === 0 ? 'All Artists' : node.label;
    if (i < path.length - 1) { const d = i; btn.addEventListener('click', () => navigateTo(d)); }
    crumbsEl.appendChild(btn);
  });
}

// ---- Events ----
let clickOrigin = null;

cvs.addEventListener('mousedown', e => {
  drag = true; dragMoved = false;
  lx = e.clientX; ly = e.clientY;
  clickOrigin = { x: e.clientX, y: e.clientY };
  autoRot = false; clearTimeout(idleT);
});
window.addEventListener('mousemove', e => {
  const rect = cvs.getBoundingClientRect();
  mx = e.clientX - rect.left; my = e.clientY - rect.top;
  if (drag) {
    if (Math.abs(e.clientX - lx) > 2 || Math.abs(e.clientY - ly) > 2) dragMoved = true;
    rY += (e.clientX - lx) * 0.005;
    rX = clamp(rX + (e.clientY - ly) * 0.005, -1.5, 1.5);
    lx = e.clientX; ly = e.clientY;
  }
});
window.addEventListener('mouseup', e => {
  if (clickOrigin && !dragMoved) handleClick();
  drag = false; clickOrigin = null;
  idleT = setTimeout(() => autoRot = true, 3000);
});

function handleClick() {
  if (animPhase !== 'idle') return;
  const hov = hitTest();
  if (hov < 0) return;
  const node = sphereNodes[hov];

  // Album node or single-album artist → generate mix
  if (node._isAlbum || node._albumObj) {
    const albumObj = node._albumObj;
    if (albumObj) openMixPanel(albumObj);
    return;
  }
  // Artist with albums → drill in
  if (node.hasChildren) {
    enterSphere(node.ref, node.label);
  }
}

cvs.addEventListener('wheel', e => {
  e.preventDefault();
  zm = clamp(zm * (e.deltaY > 0 ? 0.94 : 1.06), 0.4, 3);
}, { passive: false });

// Touch
let tDrag = false, tLx = 0, tLy = 0, tStart = null, pinchD = 0;
cvs.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    tDrag = true; dragMoved = false;
    tLx = e.touches[0].clientX; tLy = e.touches[0].clientY;
    tStart = { x: tLx, y: tLy };
    autoRot = false; clearTimeout(idleT);
  } else if (e.touches.length === 2) {
    tDrag = false; tStart = null;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchD = Math.sqrt(dx * dx + dy * dy);
  }
}, { passive: false });
cvs.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && tDrag) {
    const rect = cvs.getBoundingClientRect();
    mx = e.touches[0].clientX - rect.left; my = e.touches[0].clientY - rect.top;
    const dx = e.touches[0].clientX - tLx, dy = e.touches[0].clientY - tLy;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
    rY += dx * 0.005; rX = clamp(rX + dy * 0.005, -1.5, 1.5);
    tLx = e.touches[0].clientX; tLy = e.touches[0].clientY;
  } else if (e.touches.length === 2 && pinchD > 0) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.sqrt(dx * dx + dy * dy);
    zm = clamp(zm * (d / pinchD), 0.4, 3); pinchD = d;
  }
}, { passive: false });
cvs.addEventListener('touchend', e => {
  e.preventDefault();
  if (tStart && e.changedTouches.length === 1 && !dragMoved) {
    const t = e.changedTouches[0];
    const rect = cvs.getBoundingClientRect();
    mx = t.clientX - rect.left; my = t.clientY - rect.top;
    tDrag = false; handleClick();
  }
  tDrag = false; tStart = null; pinchD = 0;
  idleT = setTimeout(() => autoRot = true, 3000);
}, { passive: false });

// Hit test
function hitTest() {
  if (drag || tDrag || animPhase !== 'idle') return -1;
  const R = Math.min(W, H) * 0.34;
  const projected = sphereNodes.map((n, i) => ({ i, ...project(n.x, n.y, n.z, R) }));
  projected.sort((a, b) => b.z - a.z);
  for (const p of projected) {
    const n = sphereNodes[p.i];
    const fs = Math.max(9, 12 * p.s);
    ctx.font = `500 ${fs.toFixed(1)}px 'DM Sans',sans-serif`;
    const tw = ctx.measureText(n.label).width;
    const pad = 6 * p.s;
    const isAlb = n._isAlbum || n._albumObj;
    const _ce = isAlb && n._albumObj ? coverCache[n._albumObj.coverUrl] : null;
    const covW = (_ce && _ce.loaded) ? fs * 0.7 * 2 + 6 : 0;
    const hw = tw / 2 + pad + covW / 2;
    if (mx >= p.sx - hw && mx <= p.sx + hw && my >= p.sy - fs/2 - pad && my <= p.sy + fs/2 + pad) return p.i;
  }
  return -1;
}

// ============================================================
// Mix Panel
// ============================================================

let mixPlaylist = []; // { track, score }
let mixPlaying = -1;

function openMixPanel(albumObj) {
  const panel = document.getElementById('playlist-panel');
  document.getElementById('pl-title').textContent = `Mix: ${albumObj.album}`;
  document.getElementById('pl-sub').textContent = `${albumObj.artist} — ${albumObj.album} + similar tracks`;

  mixPlaylist = generateMix(albumObj, 30);

  const list = document.getElementById('pl-list');
  if (!mixPlaylist.length) {
    list.innerHTML = '<div class="playlist-empty">No matching tracks found</div>';
  } else {
    const simTracks = mixPlaylist.filter(m => !m.seed);
    const maxScore = simTracks.length ? simTracks[0].score : 1;
    list.innerHTML = mixPlaylist.map((m, i) => {
      const covUrl = `/music/${encodeURIComponent(m.track.artist)}/${encodeURIComponent(m.track.album)}/cover.jpg`;
      return `
      <div class="playlist-row${i === mixPlaying ? ' playing' : ''}${m.seed ? ' seed' : ''}" data-idx="${i}">
        <span class="playlist-num">${i + 1}</span>
        <img class="playlist-cover" src="${covUrl}" loading="lazy" alt="">
        <div class="playlist-info">
          <div class="playlist-title">${esc(m.track.title)}</div>
          <div class="playlist-meta">${esc(m.track.artist)} · ${esc(m.track.album)}</div>
        </div>
        ${m.seed ? '<span class="playlist-seed-tag">SEED</span>' : `
        <div class="playlist-score">
          <div class="playlist-score-fill" style="width:${(m.score / maxScore * 100).toFixed(1)}%"></div>
        </div>
        <span class="playlist-pct">${(m.score * 100).toFixed(0)}%</span>`}
      </div>`;
    }).join('');

    list.querySelectorAll('.playlist-row').forEach(row => {
      row.addEventListener('click', () => playMixIdx(parseInt(row.dataset.idx)));
    });
  }

  panel.classList.add('open');
  // Show the playlist button in the player bar so user can reopen later
  document.getElementById('show-playlist-btn').classList.add('visible');
}

function closeMixPanel() {
  document.getElementById('playlist-panel').classList.remove('open');
}

// Reopen playlist panel
document.getElementById('show-playlist-btn').addEventListener('click', () => {
  if (mixPlaylist.length) {
    document.getElementById('playlist-panel').classList.add('open');
  }
});

document.getElementById('pl-close').addEventListener('click', closeMixPanel);

// ============================================================
// Audio Player
// ============================================================
const audio = new Audio();
audio.addEventListener('ended', () => playMixIdx(mixPlaying + 1));
let seeking = false;
const seekBar = document.getElementById('seek-bar');
seekBar.addEventListener('mousedown', () => seeking = true);
seekBar.addEventListener('touchstart', () => seeking = true);
seekBar.addEventListener('change', () => {
  if (audio.duration) audio.currentTime = (seekBar.value / 100) * audio.duration;
  seeking = false;
});
audio.addEventListener('timeupdate', () => {
  const el = document.getElementById('player-time');
  if (!audio.duration) { el.textContent = ''; return; }
  if (!seeking) seekBar.value = (audio.currentTime / audio.duration) * 100;
  const fmt = s => Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
  el.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
});
audio.addEventListener('play', updatePlayIcon);
audio.addEventListener('pause', updatePlayIcon);

function updatePlayIcon() {
  document.getElementById('play-icon').innerHTML = audio.paused
    ? '<path d="M8 5v14l11-7z"/>'
    : '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>';
}

function playMixIdx(idx) {
  if (!mixPlaylist.length) return;
  if (idx < 0) idx = 0;
  if (idx >= mixPlaylist.length) { audio.pause(); return; }
  mixPlaying = idx;
  const t = mixPlaylist[idx].track;
  audio.src = '/music/' + encodeURI(t.file);
  audio.play();
  document.getElementById('player-info').innerHTML =
    `<div class="player-track-title">${esc(t.title)}</div>
     <div class="player-track-meta">${esc(t.artist)} · ${esc(t.album)}</div>`;
  document.querySelectorAll('.playlist-row').forEach((r, i) => r.classList.toggle('playing', i === idx));
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (!audio.src) { playMixIdx(0); return; }
  audio.paused ? audio.play() : audio.pause();
});
document.getElementById('prev-btn').addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  playMixIdx(mixPlaying - 1);
});
document.getElementById('next-btn').addEventListener('click', () => playMixIdx(mixPlaying + 1));

// ============================================================
// Render
// ============================================================
function frame() {
  requestAnimationFrame(frame);
  if (autoRot && animPhase === 'idle') rY += 0.0012;

  const R = Math.min(W, H) * 0.34;
  const N = sphereNodes.length;
  ctx.clearRect(0, 0, W, H);
  if (N === 0) return;

  const pr = [];
  for (let i = 0; i < N; i++) {
    const n = sphereNodes[i];
    pr[i] = { ...project(n.x, n.y, n.z, R), alpha: n.alpha };
  }

  const hov = hitTest();
  const hovAdj = hov >= 0 && sphereAdj[hov] ? sphereAdj[hov] : null;
  const sorted = Array.from({ length: N }, (_, i) => i).sort((a, b) => pr[a].z - pr[b].z);

  // Edges
  for (const edge of sphereEdges) {
    const a = edge[0], b = edge[1], sim = edge[2] || 0;
    if (a >= N || b >= N) continue;
    const pa = pr[a], pb = pr[b];
    const ea = Math.min(pa.alpha, pb.alpha);
    if (ea < 0.01) continue;
    const related = hov >= 0 && (a === hov || b === hov);
    const dim = hov >= 0 && !related;

    if (dim) {
      ctx.strokeStyle = `rgba(140,90,65,${(0.02 * ea).toFixed(3)})`; ctx.lineWidth = 0.4;
    } else if (related) {
      ctx.strokeStyle = `rgba(196,112,75,${((0.15 + sim * 0.4) * ea).toFixed(3)})`; ctx.lineWidth = 1 + sim * 1.5;
    } else {
      const depth = 1 - (((pa.z + pb.z) / 2) + R) / (R * 2);
      ctx.strokeStyle = `rgba(140,90,65,${((0.02 + depth * 0.06) * ea).toFixed(3)})`; ctx.lineWidth = 0.5;
    }
    ctx.beginPath(); ctx.moveTo(pa.sx, pa.sy); ctx.lineTo(pb.sx, pb.sy); ctx.stroke();

    // Similarity label on hovered edges
    if (related && sim) {
      ctx.fillStyle = `rgba(196,112,75,0.5)`;
      ctx.font = "400 9px 'DM Sans',sans-serif";
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(`${(sim * 100).toFixed(0)}%`, (pa.sx + pb.sx) / 2, (pa.sy + pb.sy) / 2 - 8);
    }
  }

  // Nodes
  for (const i of sorted) {
    const p = pr[i], n = sphereNodes[i];
    if (p.alpha < 0.01) continue;
    const isH = i === hov;
    const isC = hov >= 0 && hovAdj && hovAdj.has(i);
    const isD = hov >= 0 && !isH && !isC;
    const depth = 1 - (p.z + R) / (R * 2);
    const fs = Math.max(9, 12 * p.s);
    const pad = 6 * p.s, rad = 4 * p.s;

    const isAlbumNode = n._isAlbum || n._albumObj;

    ctx.font = `${isH ? 500 : 400} ${fs.toFixed(1)}px 'DM Sans',sans-serif`;
    const tw = ctx.measureText(n.label).width;
    const _covEntry = isAlbumNode && n._albumObj ? coverCache[n._albumObj.coverUrl] : null;
    const _hasCov = _covEntry && _covEntry.loaded;
    const covExtra = _hasCov ? fs * 0.7 * 2 + 6 : 0;
    const bw = tw + pad * 2 + covExtra, bh = Math.max(fs + pad * 2, _hasCov ? fs * 0.7 * 2 + pad : 0);
    const bx = p.sx - bw / 2, by = p.sy - bh / 2;

    let bgA, txA;

    if (isH) { bgA = 0.12; txA = 0.95; }
    else if (isC) { bgA = 0.08; txA = 0.7; }
    else if (isD) { bgA = 0.015; txA = 0.08; }
    else { bgA = 0.03 + depth * 0.06; txA = 0.1 + depth * 0.55; }
    bgA *= p.alpha; txA *= p.alpha;

    // Tag background
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, rad);
    ctx.fillStyle = `rgba(196,112,75,${bgA.toFixed(3)})`; ctx.fill();
    if (isH || isC) {
      ctx.strokeStyle = `rgba(196,112,75,${isH ? 0.8 : 0.35})`; ctx.lineWidth = isH ? 1.5 : 1; ctx.stroke();
    }

    // Dive arrow / mix icon
    if (!isD && depth > 0.2) {
      const iconA = (isH ? 0.7 : 0.15) * p.alpha;
      const ax = bx + bw - pad * 0.7, ay = p.sy, as = fs * 0.22;
      ctx.strokeStyle = `rgba(196,112,75,${iconA.toFixed(2)})`; ctx.lineWidth = 1.2;
      if (n.hasChildren) {
        // Arrow for drill-in
        ctx.beginPath();
        ctx.moveTo(ax - as * 0.3, ay - as); ctx.lineTo(ax + as * 0.5, ay); ctx.lineTo(ax - as * 0.3, ay + as);
        ctx.stroke();
      } else if (isAlbumNode) {
        // Play icon for mix-generating albums
        ctx.beginPath();
        ctx.moveTo(ax - as * 0.2, ay - as); ctx.lineTo(ax + as * 0.6, ay); ctx.lineTo(ax - as * 0.2, ay + as);
        ctx.closePath(); ctx.stroke();
      }
    }

    // Cover art (album nodes only)
    const covEntry = isAlbumNode && n._albumObj ? coverCache[n._albumObj.coverUrl] : null;
    const hasCov = covEntry && covEntry.loaded;
    const covR = fs * 0.7; // circle radius
    const covShift = hasCov ? covR + 4 : 0; // shift text right to make room

    if (hasCov) {
      ctx.save();
      ctx.globalAlpha = txA;
      const cx = p.sx - tw / 2 - covR - 2, cy = p.sy;
      ctx.beginPath(); ctx.arc(cx, cy, covR, 0, Math.PI * 2); ctx.clip();
      ctx.drawImage(covEntry.img, cx - covR, cy - covR, covR * 2, covR * 2);
      ctx.restore();
    }

    // Text
    ctx.font = `${isH ? 500 : 400} ${fs.toFixed(1)}px 'DM Sans',sans-serif`;
    const txR = isD ? 110 : 232, txG = isD ? 109 : 230, txB = isD ? 106 : 227;
    ctx.fillStyle = `rgba(${txR},${txG},${txB},${txA.toFixed(3)})`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(n.label, p.sx + (hasCov ? covShift / 2 : 0), p.sy);
  }

  // Tooltip
  if (hov >= 0 && animPhase === 'idle') {
    const p = pr[hov], n = sphereNodes[hov];
    const isAlbumNode = n._isAlbum || n._albumObj;
    document.getElementById('tip-name').textContent = n.label;

    let meta = '';
    if (isAlbumNode && n._albumObj) {
      meta = `${n._albumObj.trackCount} track${n._albumObj.trackCount !== 1 ? 's' : ''}`;
      if (n._albumObj.artist) meta = n._albumObj.artist + ' · ' + meta;
    } else if (n.artistIdx != null && allArtists[n.artistIdx]) {
      const a = allArtists[n.artistIdx];
      meta = `${a.trackCount} tracks · ${a.albums.length} album${a.albums.length !== 1 ? 's' : ''}`;
    }
    const connCount = sphereAdj[hov] ? sphereAdj[hov].size : 0;
    if (connCount) meta += ` · ${connCount} connections`;
    document.getElementById('tip-meta').textContent = meta;

    if (n.hasChildren) {
      document.getElementById('tip-dive').textContent = 'tap to see albums →';
    } else if (isAlbumNode) {
      document.getElementById('tip-dive').textContent = 'tap to generate mix →';
    } else {
      document.getElementById('tip-dive').textContent = '';
    }
    document.getElementById('tip-dive').style.display = (n.hasChildren || isAlbumNode) ? 'block' : 'none';

    let tx = p.sx + 18, ty = p.sy - 20;
    if (tx + 240 > W) tx = p.sx - 258;
    if (ty < 10) ty = 10;
    tip.style.left = tx + 'px'; tip.style.top = ty + 'px';
    tip.classList.add('on');
    cvs.style.cursor = (n.hasChildren || isAlbumNode) ? 'pointer' : 'grab';
  } else {
    tip.classList.remove('on');
    cvs.style.cursor = drag || tDrag ? 'grabbing' : 'grab';
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ============================================================
// Init
// ============================================================
async function init() {
  try {
    const res = await fetch('/api/tracks?per_page=2000');
    const data = await res.json();
    allTracks = data.tracks || [];
    if (!allTracks.length) { document.getElementById('status').textContent = 'No tracks'; return; }

    ranges = computeRanges(allTracks);
    // Pre-compute composite per track
    for (const t of allTracks) t._composite = trackComposite(t, ranges);

    buildData();
    preloadAllCovers();
    buildNeighborCache();

    document.getElementById('status').textContent = `${allArtists.length} artists · ${allAlbums.length} albums · ${allTracks.length} tracks`;

    const rootGraph = buildRootGraph();
    enterSphere(rootGraph, '');
    requestAnimationFrame(frame);
  } catch (e) {
    document.getElementById('status').textContent = 'Failed to load';
    console.error(e);
  }
}

init();
</script>
</body>
</html>
