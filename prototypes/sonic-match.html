<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusiCast — Sonic Match</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0e10;
    color: #e8e6e3;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid #1e1e22;
  }
  .top-bar a { color: #6e6d6a; text-decoration: none; font-size: 13px; transition: color 0.2s; }
  .top-bar a:hover { color: #e8e6e3; }
  .top-bar h1 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 20px; }
  .top-bar .status { font-size: 12px; color: #6e6d6a; }

  .main {
    display: flex;
    height: calc(100vh - 57px - 56px);
  }

  /* --- Left: search + seed --- */
  .left-panel {
    width: 380px; flex-shrink: 0;
    display: flex; flex-direction: column;
    border-right: 1px solid #1e1e22;
  }

  .search-box {
    padding: 16px 20px;
    border-bottom: 1px solid #1e1e22;
  }
  .search-box input {
    width: 100%; padding: 10px 14px;
    background: #161619; border: 1px solid #2a2a2e; border-radius: 8px;
    color: #e8e6e3; font-size: 14px; font-family: inherit; outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: #c4704b; }
  .search-box input::placeholder { color: #4a4a4a; }

  .search-results {
    flex: 1; overflow-y: auto; padding: 4px 0;
  }

  .search-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; cursor: pointer;
    transition: background 0.15s;
  }
  .search-row:hover { background: rgba(255,255,255,0.03); }
  .search-row.selected { background: rgba(196, 112, 75, 0.10); }

  .search-row-info { flex: 1; min-width: 0; }
  .search-row-title {
    font-size: 13px; font-weight: 400;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .search-row-meta {
    font-size: 11px; color: #5a5a58; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .search-row .seed-badge {
    font-size: 10px; color: #c4704b; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase; flex-shrink: 0;
  }

  .search-hint {
    padding: 40px 20px; text-align: center;
    color: #3a3a3a; font-size: 13px; line-height: 1.6;
  }

  /* --- Seed card --- */
  .seed-section {
    border-top: 1px solid #1e1e22;
    padding: 16px 20px;
    background: #131316;
  }
  .seed-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: #6e6d6a; margin-bottom: 8px;
  }
  .seed-title { font-size: 15px; font-weight: 500; }
  .seed-meta { font-size: 12px; color: #6e6d6a; margin-top: 2px; }
  .seed-features {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
  }
  .seed-tag {
    font-size: 10px; padding: 3px 8px;
    background: #1e1e22; border-radius: 4px; color: #888;
  }
  .seed-empty { color: #3a3a3a; font-size: 13px; }

  /* --- Right: similar tracks --- */
  .right-panel {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }

  .results-header {
    padding: 16px 24px;
    border-bottom: 1px solid #1e1e22;
    display: flex; align-items: center; justify-content: space-between;
  }
  .results-header-text { font-size: 13px; color: #6e6d6a; }
  .results-header-text strong { color: #e8e6e3; font-weight: 500; }

  .results-header input[type="range"] {
    width: 120px;
    -webkit-appearance: none; appearance: none;
    height: 4px; background: #2a2a2e; border-radius: 2px; outline: none;
  }
  .results-header input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: #c4704b; cursor: pointer;
    box-shadow: 0 0 6px rgba(196, 112, 75, 0.3);
  }
  .results-limit-label { font-size: 11px; color: #6e6d6a; }

  .results-list {
    flex: 1; overflow-y: auto; padding: 4px 0;
  }

  .result-row {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 24px; cursor: pointer;
    transition: background 0.15s;
  }
  .result-row:hover { background: rgba(255,255,255,0.02); }
  .result-row.playing { background: rgba(196, 112, 75, 0.08); }

  .result-num {
    width: 24px; text-align: right;
    font-size: 12px; color: #4a4a4a;
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }
  .result-row.playing .result-num { color: #c4704b; }

  .result-info { flex: 1; min-width: 0; }
  .result-title {
    font-size: 13px; font-weight: 400;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .result-meta {
    font-size: 11px; color: #5a5a58; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .result-score {
    flex-shrink: 0; width: 64px; height: 4px;
    background: #1e1e22; border-radius: 2px; overflow: hidden;
  }
  .result-score-fill {
    height: 100%; background: #c4704b; border-radius: 2px;
  }

  .result-pct {
    flex-shrink: 0; width: 36px; text-align: right;
    font-size: 11px; color: #5a5a58; font-variant-numeric: tabular-nums;
  }

  .results-empty {
    padding: 60px 24px; text-align: center;
    color: #3a3a3a; font-size: 13px; line-height: 1.6;
  }

  /* --- Player bar --- */
  .player-bar {
    display: flex; align-items: center; gap: 12px;
    height: 56px; padding: 0 24px;
    border-top: 1px solid #1e1e22;
    background: #141416; flex-shrink: 0;
  }
  .player-btn {
    background: none; border: none; cursor: pointer;
    color: #888; padding: 4px; transition: color 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .player-btn:hover { color: #e8e6e3; }
  .player-btn svg { width: 20px; height: 20px; fill: currentColor; }
  .player-btn.play-btn svg { width: 24px; height: 24px; }
  .player-track-info { flex: 1; min-width: 0; }
  .player-track-title {
    font-size: 13px; font-weight: 400;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .player-track-meta {
    font-size: 11px; color: #5a5a58; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .player-seek {
    flex: 1; max-width: 280px;
    -webkit-appearance: none; appearance: none;
    height: 3px; background: #2a2a2e; border-radius: 2px; outline: none;
    cursor: pointer;
  }
  .player-seek::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 10px; height: 10px; border-radius: 50%;
    background: #c4704b; cursor: pointer;
  }
  .player-time {
    font-size: 11px; color: #5a5a58;
    font-variant-numeric: tabular-nums; flex-shrink: 0; min-width: 80px; text-align: right;
  }
  .player-idle { font-size: 12px; color: #4a4a4a; }

  /* Scrollbars */
  .search-results::-webkit-scrollbar,
  .results-list::-webkit-scrollbar { width: 4px; }
  .search-results::-webkit-scrollbar-track,
  .results-list::-webkit-scrollbar-track { background: transparent; }
  .search-results::-webkit-scrollbar-thumb,
  .results-list::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 2px; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html">&larr; Prototypes</a>
  <h1>Sonic Match</h1>
  <span class="status" id="status">Loading...</span>
</div>

<div class="main">
  <div class="left-panel">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search for a track..." autofocus>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-hint">Type to search your library.<br>Select a track to find its sonic matches.</div>
    </div>
    <div class="seed-section" id="seed-section">
      <div class="seed-label">Seed track</div>
      <div class="seed-empty" id="seed-empty">No track selected</div>
      <div id="seed-info" style="display:none">
        <div class="seed-title" id="seed-title"></div>
        <div class="seed-meta" id="seed-meta"></div>
        <div class="seed-features" id="seed-features"></div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="results-header">
      <div class="results-header-text">Similar tracks: <strong id="similar-count">0</strong></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="results-limit-label">Show</span>
        <input type="range" id="limit-slider" min="10" max="50" value="25">
        <span class="results-limit-label" id="limit-label">25</span>
      </div>
    </div>
    <div class="results-list" id="results-list">
      <div class="results-empty">Select a seed track to discover similar songs</div>
    </div>
  </div>
</div>

<div class="player-bar">
  <button class="player-btn" id="prev-btn" title="Previous">
    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
  </button>
  <button class="player-btn play-btn" id="play-btn" title="Play/Pause">
    <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <button class="player-btn" id="next-btn" title="Next">
    <svg viewBox="0 0 24 24"><path d="M16 18h2V6h-2zM6 18l8.5-6L6 6z"/></svg>
  </button>
  <div class="player-track-info" id="player-info">
    <span class="player-idle">Click a track to play</span>
  </div>
  <input type="range" class="player-seek" id="seek-bar" min="0" max="100" value="0">
  <span class="player-time" id="player-time"></span>
</div>

<script>
const KEY_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

let allTracks = [];
let seedTrack = null;
let similarTracks = [];
let currentIndex = -1;
let searchDebounce = null;

// --- Load all tracks for search ---
async function init() {
  try {
    const res = await fetch('/api/tracks?per_page=2000');
    const data = await res.json();
    allTracks = data.tracks || [];
    document.getElementById('status').textContent = `${allTracks.length} tracks`;
  } catch (e) {
    document.getElementById('status').textContent = 'Failed to load';
  }
}

// --- Search ---
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(doSearch, 200);
});

function doSearch() {
  const q = searchInput.value.trim().toLowerCase();
  const container = document.getElementById('search-results');

  if (!q) {
    container.innerHTML = '<div class="search-hint">Type to search your library.<br>Select a track to find its sonic matches.</div>';
    return;
  }

  const matches = allTracks.filter(t =>
    t.title.toLowerCase().includes(q) ||
    t.artist.toLowerCase().includes(q) ||
    t.album.toLowerCase().includes(q)
  ).slice(0, 50);

  if (!matches.length) {
    container.innerHTML = '<div class="search-hint">No matches</div>';
    return;
  }

  container.innerHTML = matches.map(t => `
    <div class="search-row${seedTrack && seedTrack.track_id === t.track_id ? ' selected' : ''}" data-id="${esc(t.track_id)}">
      <div class="search-row-info">
        <div class="search-row-title">${esc(t.title)}</div>
        <div class="search-row-meta">${esc(t.artist)} &middot; ${esc(t.album)}</div>
      </div>
      ${seedTrack && seedTrack.track_id === t.track_id ? '<span class="seed-badge">Seed</span>' : ''}
    </div>
  `).join('');

  container.querySelectorAll('.search-row').forEach(row => {
    row.addEventListener('click', () => selectSeed(row.dataset.id));
  });
}

// --- Select seed ---
async function selectSeed(trackId) {
  seedTrack = allTracks.find(t => t.track_id === trackId);
  if (!seedTrack) return;

  // Update seed card
  document.getElementById('seed-empty').style.display = 'none';
  const info = document.getElementById('seed-info');
  info.style.display = 'block';
  document.getElementById('seed-title').textContent = seedTrack.title;
  document.getElementById('seed-meta').textContent = `${seedTrack.artist} — ${seedTrack.album}`;

  const keyName = KEY_NAMES[seedTrack.key] || '?';
  const mode = seedTrack.mode === 1 ? 'maj' : 'min';
  const bpm = seedTrack.tempo ? seedTrack.tempo.toFixed(0) + ' BPM' : '';
  const tags = [
    bpm,
    `${keyName} ${mode}`,
    `RMS ${seedTrack.rms_mean?.toFixed(1)} dB`,
    `DR ${seedTrack.dynamic_range?.toFixed(1)}`,
    `Centroid ${seedTrack.centroid_mean?.toFixed(0)} Hz`,
  ].filter(Boolean);

  document.getElementById('seed-features').innerHTML =
    tags.map(t => `<span class="seed-tag">${t}</span>`).join('');

  // Highlight in search
  doSearch();

  // Fetch similar
  await fetchSimilar(trackId);
}

async function fetchSimilar(trackId) {
  const limit = document.getElementById('limit-slider').value;
  try {
    const res = await fetch(`/api/similar?key=${encodeURIComponent(trackId)}&limit=${limit}`);
    similarTracks = await res.json();
    renderSimilar();
  } catch (e) {
    document.getElementById('results-list').innerHTML =
      '<div class="results-empty">Failed to fetch similar tracks</div>';
  }
}

function renderSimilar() {
  const container = document.getElementById('results-list');
  document.getElementById('similar-count').textContent = similarTracks.length;

  if (!similarTracks.length) {
    container.innerHTML = '<div class="results-empty">No similar tracks found</div>';
    return;
  }

  const maxScore = similarTracks[0]?.score || 1;

  container.innerHTML = similarTracks.map((t, i) => `
    <div class="result-row${i === currentIndex ? ' playing' : ''}" data-idx="${i}">
      <span class="result-num">${i + 1}</span>
      <div class="result-info">
        <div class="result-title">${esc(t.title)}</div>
        <div class="result-meta">${esc(t.artist)} &middot; ${esc(t.album)}</div>
      </div>
      <div class="result-score">
        <div class="result-score-fill" style="width: ${(t.score / maxScore * 100).toFixed(1)}%"></div>
      </div>
      <span class="result-pct">${(t.score * 100).toFixed(0)}%</span>
    </div>
  `).join('');

  container.querySelectorAll('.result-row').forEach(row => {
    row.addEventListener('click', () => playIndex(parseInt(row.dataset.idx)));
  });
}

// --- Limit slider ---
const limitSlider = document.getElementById('limit-slider');
limitSlider.addEventListener('input', () => {
  document.getElementById('limit-label').textContent = limitSlider.value;
});
limitSlider.addEventListener('change', () => {
  if (seedTrack) fetchSimilar(seedTrack.track_id);
});

// --- Audio player ---
const audio = new Audio();
audio.addEventListener('ended', () => playIndex(currentIndex + 1));
let seeking = false;
const seekBar = document.getElementById('seek-bar');
seekBar.addEventListener('mousedown', () => seeking = true);
seekBar.addEventListener('touchstart', () => seeking = true);
seekBar.addEventListener('change', () => {
  if (audio.duration) audio.currentTime = (seekBar.value / 100) * audio.duration;
  seeking = false;
});

audio.addEventListener('timeupdate', () => {
  const el = document.getElementById('player-time');
  if (!audio.duration) { el.textContent = ''; return; }
  if (!seeking) seekBar.value = (audio.currentTime / audio.duration) * 100;
  el.textContent = fmtTime(audio.currentTime) + ' / ' + fmtTime(audio.duration);
});
audio.addEventListener('play', updatePlayIcon);
audio.addEventListener('pause', updatePlayIcon);

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function updatePlayIcon() {
  const icon = document.getElementById('play-icon');
  icon.innerHTML = audio.paused
    ? '<path d="M8 5v14l11-7z"/>'
    : '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>';
}

function playIndex(idx) {
  if (!similarTracks.length) return;
  if (idx < 0) idx = 0;
  if (idx >= similarTracks.length) { audio.pause(); return; }

  currentIndex = idx;
  const t = similarTracks[idx];

  // Build URL from key (artist::album::title) — need file path
  // Similar API returns file field
  const url = '/music/' + encodeURI(t.file);
  audio.src = url;
  audio.play();

  document.getElementById('player-info').innerHTML =
    `<div class="player-track-title">${esc(t.title)}</div>` +
    `<div class="player-track-meta">${esc(t.artist)} &middot; ${esc(t.album)}</div>`;

  document.querySelectorAll('.result-row').forEach((row, i) => {
    row.classList.toggle('playing', i === currentIndex);
  });
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (!audio.src) { playIndex(0); return; }
  audio.paused ? audio.play() : audio.pause();
});
document.getElementById('prev-btn').addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  playIndex(currentIndex - 1);
});
document.getElementById('next-btn').addEventListener('click', () => {
  playIndex(currentIndex + 1);
});

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

init();
</script>
</body>
</html>
