<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soniq — Sonic Radar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0e10;
    color: #e8e6e3;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid #1e1e22;
  }
  .top-bar a { color: #6e6d6a; text-decoration: none; font-size: 13px; transition: color 0.2s; }
  .top-bar a:hover { color: #e8e6e3; }
  .top-bar h1 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 20px; }
  .top-bar .status { font-size: 12px; color: #6e6d6a; }

  .main {
    display: flex;
    height: calc(100vh - 57px - 56px);
  }

  /* --- Left panel --- */
  .left-panel {
    width: 320px; flex-shrink: 0;
    display: flex; flex-direction: column;
    border-right: 1px solid #1e1e22;
  }

  .search-box {
    padding: 16px 20px;
    border-bottom: 1px solid #1e1e22;
  }
  .search-box input {
    width: 100%; padding: 10px 14px;
    background: #161619; border: 1px solid #2a2a2e; border-radius: 8px;
    color: #e8e6e3; font-size: 14px; font-family: inherit; outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: #c4704b; }
  .search-box input::placeholder { color: #4a4a4a; }

  .artist-list {
    flex: 1; overflow-y: auto; padding: 4px 0;
  }

  .artist-row {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 20px; cursor: pointer;
    transition: background 0.15s;
  }
  .artist-row:hover { background: rgba(255,255,255,0.03); }
  .artist-row.selected { background: rgba(196, 112, 75, 0.10); }

  .artist-row-name {
    flex: 1; min-width: 0;
    font-size: 13px; font-weight: 400;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .artist-row-count {
    font-size: 11px; color: #5a5a58;
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }

  .artist-hint {
    padding: 40px 20px; text-align: center;
    color: #3a3a3a; font-size: 13px; line-height: 1.6;
  }

  /* --- Feature profile card --- */
  .profile-section {
    border-top: 1px solid #1e1e22;
    padding: 16px 20px;
    background: #131316;
  }
  .profile-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: #6e6d6a; margin-bottom: 10px;
  }
  .profile-empty { color: #3a3a3a; font-size: 13px; }
  .profile-bars { display: flex; flex-direction: column; gap: 8px; }
  .profile-bar-row {
    display: flex; align-items: center; gap: 10px;
  }
  .profile-bar-label {
    width: 100px; font-size: 11px; color: #888;
    flex-shrink: 0;
  }
  .profile-bar-track {
    flex: 1; height: 6px; background: #1e1e22; border-radius: 3px; overflow: hidden;
  }
  .profile-bar-fill {
    height: 100%; background: #c4704b; border-radius: 3px;
    transition: width 0.4s ease;
  }
  .profile-bar-val {
    width: 32px; text-align: right;
    font-size: 10px; color: #5a5a58;
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }

  /* --- Canvas area --- */
  .canvas-area {
    flex: 1; position: relative; overflow: hidden;
    background: #0e0e10;
  }
  .canvas-area canvas {
    display: block;
    width: 100%; height: 100%;
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: #1e1e22;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #e8e6e3;
    line-height: 1.5;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 220px;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-name { font-weight: 500; margin-bottom: 2px; }
  .tooltip-detail { color: #6e6d6a; font-size: 11px; }

  .canvas-empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #3a3a3a; font-size: 14px;
  }

  /* --- Player bar --- */
  .player-bar {
    display: flex; align-items: center; gap: 12px;
    height: 56px; padding: 0 24px;
    border-top: 1px solid #1e1e22;
    background: #141416; flex-shrink: 0;
  }
  .player-idle { font-size: 12px; color: #4a4a4a; }

  /* Scrollbars */
  .artist-list::-webkit-scrollbar { width: 4px; }
  .artist-list::-webkit-scrollbar-track { background: transparent; }
  .artist-list::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 2px; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html">&larr; Prototypes</a>
  <h1>Sonic Radar</h1>
  <span class="status" id="status">Loading...</span>
</div>

<div class="main">
  <div class="left-panel">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search artists..." autofocus>
    </div>
    <div class="artist-list" id="artist-list">
      <div class="artist-hint">Loading artists...</div>
    </div>
    <div class="profile-section" id="profile-section">
      <div class="profile-label">Feature profile</div>
      <div class="profile-empty" id="profile-empty">No artist selected</div>
      <div class="profile-bars" id="profile-bars" style="display:none"></div>
    </div>
  </div>

  <div class="canvas-area" id="canvas-area">
    <canvas id="radar-canvas"></canvas>
    <div class="canvas-empty" id="canvas-empty">Select an artist to map sonic similarity</div>
    <div class="tooltip" id="tooltip">
      <div class="tooltip-name" id="tooltip-name"></div>
      <div class="tooltip-detail" id="tooltip-detail"></div>
    </div>
  </div>
</div>

<div class="player-bar">
  <span class="player-idle">Select an artist to explore sonic neighbors</span>
</div>

<script>
// ---- Feature extraction helpers ----

const DIMENSIONS = ['Energy', 'Acousticness', 'Danceability', 'Valence', 'Instrumental', 'Texture', 'Dynamics', 'Stillness'];

function clamp01(v) { return Math.max(0, Math.min(1, v || 0)); }

function normalizeField(v, min, max) {
  if (v == null || isNaN(v)) return 0;
  return clamp01((v - min) / (max - min));
}

// Build composite dimensions from raw features for a single track
function trackComposite(t, ranges) {
  const n = (field) => normalizeField(t[field], ranges[field]?.min ?? 0, ranges[field]?.max ?? 1);

  const energy = n('rms_mean') * 1.0 + n('onset_strength') * 0.8 + n('beat_strength') * 0.6 + n('dynamic_range') * 0.4;
  const acousticness = (1 - n('flatness_mean')) * 1.0 + (1 - n('centroid_mean')) * 0.8 + (1 - n('zcr_mean')) * 0.6;
  const danceability = n('beat_strength') * 1.2 + n('tempo') * 0.6 + n('onset_strength') * 0.4;
  const valence = n('mode') * 1.0 + n('centroid_mean') * 0.6 + n('rms_mean') * 0.4;
  const vocalProxy = n('vocal_proxy') || 0;
  const instrumentalness = (1 - vocalProxy) * 1.0;
  const texture = n('flatness_mean') * 1.0 + n('zcr_mean') * 0.8 + n('spectral_flux') * 0.6;
  const dynamics = n('dynamic_range') * 1.2 + n('rms_variance') * 0.8 + n('rms_max') * 0.4;
  const stillness = (1 - n('onset_strength')) * 1.0 + (1 - n('beat_strength')) * 1.0 + (1 - n('spectral_flux')) * 0.8;

  return [
    energy / 2.8,
    acousticness / 2.4,
    danceability / 2.2,
    valence / 2.0,
    instrumentalness / 1.0,
    texture / 2.4,
    dynamics / 2.4,
    stillness / 2.8
  ];
}

function computeRanges(tracks) {
  const fields = ['rms_mean', 'onset_strength', 'beat_strength', 'dynamic_range',
    'flatness_mean', 'centroid_mean', 'zcr_mean', 'tempo', 'mode', 'vocal_proxy',
    'spectral_flux', 'rms_variance', 'rms_max'];
  const ranges = {};
  for (const f of fields) {
    let min = Infinity, max = -Infinity;
    for (const t of tracks) {
      const v = t[f];
      if (v != null && !isNaN(v)) {
        if (v < min) min = v;
        if (v > max) max = v;
      }
    }
    ranges[f] = { min: min === Infinity ? 0 : min, max: max === -Infinity ? 1 : max };
  }
  return ranges;
}

function cosineSimilarity(a, b) {
  let dot = 0, magA = 0, magB = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    magA += a[i] * a[i];
    magB += b[i] * b[i];
  }
  magA = Math.sqrt(magA);
  magB = Math.sqrt(magB);
  if (magA === 0 || magB === 0) return 0;
  return dot / (magA * magB);
}

function vecAvg(vecs) {
  const dims = 8;
  if (!vecs.length) return new Array(dims).fill(0);
  const sum = new Array(dims).fill(0);
  for (const v of vecs) {
    for (let i = 0; i < dims; i++) sum[i] += (v[i] || 0);
  }
  return sum.map(s => s / vecs.length);
}

// ---- State ----
let allTracks = [];
let ranges = {};
let artists = {}; // name -> { name, trackCount, albums: Set, composite: [5] }
let artistNames = [];
let selectedArtist = null;
let similarArtists = []; // { name, similarity, trackCount, albums, composite }
let hoveredNode = null;
let animProgress = 1;
let animStart = 0;
let prevPositions = {};
let targetPositions = {};
let currentPositions = {};
let searchDebounce = null;
let dpr = window.devicePixelRatio || 1;

const canvas = document.getElementById('radar-canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

// ---- Init ----
async function init() {
  try {
    // Try /api/artists first
    let useArtistsAPI = false;
    try {
      const res = await fetch('/api/artists');
      if (res.ok) {
        const data = await res.json();
        if (data.artists && data.artists.length) {
          useArtistsAPI = true;
          // Still need tracks for fallback similarity
        }
      }
    } catch (e) {}

    // Load all tracks for client-side computation
    const res = await fetch('/api/tracks?per_page=2000');
    const data = await res.json();
    allTracks = data.tracks || [];

    if (!allTracks.length) {
      document.getElementById('status').textContent = 'No tracks';
      return;
    }

    ranges = computeRanges(allTracks);
    buildArtists();

    artistNames = Object.keys(artists).sort((a, b) => a.localeCompare(b));
    document.getElementById('status').textContent = `${artistNames.length} artists`;

    renderArtistList();
    resizeCanvas();
    requestAnimationFrame(draw);
  } catch (e) {
    document.getElementById('status').textContent = 'Failed to load';
    console.error(e);
  }
}

function buildArtists() {
  const grouped = {};
  for (const t of allTracks) {
    const name = t.artist || 'Unknown';
    if (!grouped[name]) grouped[name] = [];
    grouped[name].push(t);
  }

  for (const [name, tracks] of Object.entries(grouped)) {
    const composites = tracks.map(t => trackComposite(t, ranges));
    const albums = new Set(tracks.map(t => t.album).filter(Boolean));
    artists[name] = {
      name,
      trackCount: tracks.length,
      albums,
      composite: vecAvg(composites)
    };
  }
}

// ---- Artist list ----
function renderArtistList(filter) {
  const container = document.getElementById('artist-list');
  let names = artistNames;

  if (filter) {
    const q = filter.toLowerCase();
    names = names.filter(n => n.toLowerCase().includes(q));
  }

  if (!names.length) {
    container.innerHTML = '<div class="artist-hint">No matching artists</div>';
    return;
  }

  container.innerHTML = names.map(name => {
    const a = artists[name];
    const sel = selectedArtist && selectedArtist.name === name ? ' selected' : '';
    return `<div class="artist-row${sel}" data-name="${esc(name)}">
      <div class="artist-row-name">${esc(name)}</div>
      <span class="artist-row-count">${a.trackCount} tracks</span>
    </div>`;
  }).join('');

  container.querySelectorAll('.artist-row').forEach(row => {
    row.addEventListener('click', () => selectArtist(row.dataset.name));
  });
}

const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    renderArtistList(searchInput.value.trim());
  }, 150);
});

// ---- Select artist ----
async function selectArtist(name) {
  const a = artists[name];
  if (!a) return;
  selectedArtist = a;

  // Update list highlighting
  document.querySelectorAll('.artist-row').forEach(row => {
    row.classList.toggle('selected', row.dataset.name === name);
  });

  // Update profile card
  updateProfile(a);

  // Try backend API first
  let gotFromAPI = false;
  try {
    const res = await fetch(`/api/artists/similar?artist=${encodeURIComponent(name)}&limit=15`);
    if (res.ok) {
      const data = await res.json();
      if (data && data.length) {
        similarArtists = data.map(d => ({
          name: d.name || d.artist,
          similarity: d.similarity || d.score || 0,
          trackCount: artists[d.name || d.artist]?.trackCount || d.track_count || 0,
          albums: artists[d.name || d.artist]?.albums || new Set(),
          composite: artists[d.name || d.artist]?.composite || new Array(8).fill(0)
        }));
        gotFromAPI = true;
      }
    }
  } catch (e) {}

  // Client-side fallback
  if (!gotFromAPI) {
    computeSimilar(name);
  }

  // Hide empty message
  document.getElementById('canvas-empty').style.display = 'none';

  // Animate to new positions
  startAnimation();
}

function computeSimilar(name) {
  const a = artists[name];
  if (!a) return;

  const results = [];
  for (const [otherName, other] of Object.entries(artists)) {
    if (otherName === name) continue;
    const sim = cosineSimilarity(a.composite, other.composite);
    results.push({
      name: otherName,
      similarity: sim,
      trackCount: other.trackCount,
      albums: other.albums,
      composite: other.composite
    });
  }

  results.sort((a, b) => b.similarity - a.similarity);
  similarArtists = results.slice(0, 15);
}

function updateProfile(a) {
  document.getElementById('profile-empty').style.display = 'none';
  const bars = document.getElementById('profile-bars');
  bars.style.display = 'flex';

  bars.innerHTML = DIMENSIONS.map((dim, i) => {
    const val = clamp01(a.composite[i]);
    const pct = (val * 100).toFixed(0);
    return `<div class="profile-bar-row">
      <span class="profile-bar-label">${dim}</span>
      <div class="profile-bar-track">
        <div class="profile-bar-fill" style="width: ${pct}%"></div>
      </div>
      <span class="profile-bar-val">${pct}%</span>
    </div>`;
  }).join('');
}

// ---- Canvas ----
function resizeCanvas() {
  const area = document.getElementById('canvas-area');
  const w = area.clientWidth;
  const h = area.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

window.addEventListener('resize', () => {
  resizeCanvas();
});

function startAnimation() {
  // Save current positions as prev
  prevPositions = { ...currentPositions };
  targetPositions = computeTargetPositions();
  animStart = performance.now();
  animProgress = 0;
}

function computeTargetPositions() {
  const area = document.getElementById('canvas-area');
  const w = area.clientWidth;
  const h = area.clientHeight;
  const cx = w / 2;
  const cy = h / 2;
  const maxRadius = Math.min(w, h) * 0.38;

  const positions = {};

  // Center node
  positions['__center__'] = { x: cx, y: cy };

  if (!similarArtists.length) return positions;

  const minSim = similarArtists[similarArtists.length - 1]?.similarity || 0;
  const maxSim = similarArtists[0]?.similarity || 1;

  similarArtists.forEach((a, i) => {
    const angle = (i / similarArtists.length) * Math.PI * 2 - Math.PI / 2;
    // Distance: higher similarity = closer to center
    const simNorm = maxSim === minSim ? 0.5 : (a.similarity - minSim) / (maxSim - minSim);
    const dist = maxRadius * (1 - simNorm * 0.7 + 0.15); // range ~0.15..0.85 of maxRadius

    positions[a.name] = {
      x: cx + Math.cos(angle) * dist,
      y: cy + Math.sin(angle) * dist
    };
  });

  return positions;
}

function easeOut(t) {
  return 1 - Math.pow(1 - t, 3);
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function draw(now) {
  requestAnimationFrame(draw);

  const area = document.getElementById('canvas-area');
  const w = area.clientWidth;
  const h = area.clientHeight;

  ctx.clearRect(0, 0, w, h);

  if (!selectedArtist) return;

  // Update animation
  const animDuration = 600;
  if (animProgress < 1) {
    animProgress = Math.min(1, (now - animStart) / animDuration);
  }
  const t = easeOut(animProgress);

  // Interpolate positions
  currentPositions = {};
  for (const key of Object.keys(targetPositions)) {
    const target = targetPositions[key];
    const prev = prevPositions[key] || target;
    currentPositions[key] = {
      x: lerp(prev.x, target.x, t),
      y: lerp(prev.y, target.y, t)
    };
  }

  const center = currentPositions['__center__'];
  if (!center) return;

  // Draw connecting lines
  for (const a of similarArtists) {
    const pos = currentPositions[a.name];
    if (!pos) continue;

    ctx.beginPath();
    ctx.moveTo(center.x, center.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = `rgba(196, 112, 75, ${0.08 + a.similarity * 0.25})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw distance rings
  const maxRadius = Math.min(w, h) * 0.38;
  for (let i = 1; i <= 3; i++) {
    const r = maxRadius * (i / 3);
    ctx.beginPath();
    ctx.arc(center.x, center.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw surrounding nodes
  const maxTrackCount = Math.max(1, ...similarArtists.map(a => a.trackCount));

  for (const a of similarArtists) {
    const pos = currentPositions[a.name];
    if (!pos) continue;

    const isHovered = hoveredNode && hoveredNode.name === a.name;
    const baseRadius = 8 + (a.trackCount / maxTrackCount) * 16;
    const radius = isHovered ? baseRadius + 3 : baseRadius;

    // Node circle
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = isHovered ? 'rgba(196, 112, 75, 0.35)' : 'rgba(196, 112, 75, 0.15)';
    ctx.fill();
    ctx.strokeStyle = isHovered ? '#c4704b' : 'rgba(196, 112, 75, 0.4)';
    ctx.lineWidth = isHovered ? 2 : 1;
    ctx.stroke();

    // Label
    ctx.fillStyle = isHovered ? '#e8e6e3' : '#888';
    ctx.font = `${isHovered ? '500' : '400'} 11px 'DM Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(a.name, pos.x, pos.y + radius + 6);
  }

  // Draw center node
  const centerRadius = 22;
  ctx.beginPath();
  ctx.arc(center.x, center.y, centerRadius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(196, 112, 75, 0.25)';
  ctx.fill();
  ctx.strokeStyle = '#c4704b';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Center glow
  const glow = ctx.createRadialGradient(center.x, center.y, 0, center.x, center.y, centerRadius + 20);
  glow.addColorStop(0, 'rgba(196, 112, 75, 0.12)');
  glow.addColorStop(1, 'rgba(196, 112, 75, 0)');
  ctx.beginPath();
  ctx.arc(center.x, center.y, centerRadius + 20, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Center label
  ctx.fillStyle = '#e8e6e3';
  ctx.font = "500 13px 'DM Sans', sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(selectedArtist.name, center.x, center.y + centerRadius + 8);
}

// ---- Mouse interaction ----
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  hoveredNode = null;

  const maxTrackCount = Math.max(1, ...similarArtists.map(a => a.trackCount));

  for (const a of similarArtists) {
    const pos = currentPositions[a.name];
    if (!pos) continue;
    const baseRadius = 8 + (a.trackCount / maxTrackCount) * 16;
    const hitRadius = baseRadius + 8;
    const dx = mx - pos.x;
    const dy = my - pos.y;
    if (dx * dx + dy * dy < hitRadius * hitRadius) {
      hoveredNode = a;
      break;
    }
  }

  // Also check center node
  if (!hoveredNode && selectedArtist) {
    const center = currentPositions['__center__'];
    if (center) {
      const dx = mx - center.x;
      const dy = my - center.y;
      if (dx * dx + dy * dy < 30 * 30) {
        hoveredNode = { name: selectedArtist.name, isCenter: true };
      }
    }
  }

  // Update tooltip
  if (hoveredNode && !hoveredNode.isCenter) {
    const a = hoveredNode;
    document.getElementById('tooltip-name').textContent = a.name;
    const albumList = a.albums instanceof Set ? [...a.albums].slice(0, 3).join(', ') : '';
    document.getElementById('tooltip-detail').innerHTML =
      `Similarity: ${(a.similarity * 100).toFixed(1)}%<br>` +
      `Tracks: ${a.trackCount}` +
      (albumList ? `<br>Albums: ${albumList}` : '');

    const tt = tooltip;
    let tx = e.clientX - rect.left + 16;
    let ty = e.clientY - rect.top - 10;

    // Keep tooltip in bounds
    if (tx + 220 > rect.width) tx = e.clientX - rect.left - 230;
    if (ty < 0) ty = 10;

    tt.style.left = tx + 'px';
    tt.style.top = ty + 'px';
    tt.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }

  canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  tooltip.classList.remove('visible');
  canvas.style.cursor = 'default';
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const maxTrackCount = Math.max(1, ...similarArtists.map(a => a.trackCount));

  for (const a of similarArtists) {
    const pos = currentPositions[a.name];
    if (!pos) continue;
    const baseRadius = 8 + (a.trackCount / maxTrackCount) * 16;
    const hitRadius = baseRadius + 8;
    const dx = mx - pos.x;
    const dy = my - pos.y;
    if (dx * dx + dy * dy < hitRadius * hitRadius) {
      tooltip.classList.remove('visible');
      hoveredNode = null;
      selectArtist(a.name);
      return;
    }
  }
});

// ---- Util ----
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

init();
</script>
</body>
</html>
