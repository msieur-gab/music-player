<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Soniq MiniPlayer</title>
  <meta name="description" content="Offline music player for your takeaway tracks">
  <meta name="theme-color" content="#111">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="screen-orientation" content="portrait">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Soniq <span class="accent">MiniPlayer</span></h1>
  <label id="import-btn" class="import-btn" for="file-input">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Import
  </label>
  <input type="file" id="file-input" multiple accept=".m4a,.mp3,.mp4,.zip,audio/*" hidden>
  <div id="import-progress" class="progress" hidden></div>
</header>

<main>
  <div id="empty" class="empty-state">
    <svg viewBox="0 0 24 24" class="empty-icon"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <p>No music yet</p>
    <p class="sub">Tap <strong>Import</strong> to add m4a files or a ZIP</p>
  </div>

  <div id="album-grid" class="album-grid"></div>

  <div id="album-detail" class="album-detail" hidden>
    <button id="detail-back" class="detail-back">
      <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      Library
    </button>
    <div class="detail-header">
      <div class="detail-cover">
        <img id="detail-cover" hidden alt="">
        <svg id="detail-cover-ph" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div class="detail-info">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-artist" id="detail-artist"></div>
        <div class="detail-count" id="detail-count"></div>
      </div>
    </div>
    <ol id="detail-tracks" class="detail-tracks"></ol>
  </div>
</main>

<div id="player">
  <div class="player-inner">
    <div class="player-left">
      <div id="player-cover-wrap" class="player-cover">
        <img id="player-cover" hidden alt="">
        <svg id="player-cover-ph" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div class="player-meta">
        <div class="player-title" id="player-title">&mdash;</div>
        <div class="player-artist" id="player-artist"></div>
      </div>
    </div>
    <div class="player-center">
      <div class="player-controls">
        <button id="prev-btn" class="ctrl-btn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor"/></svg></button>
        <button id="play-btn" class="play-btn"><svg viewBox="0 0 24 24" fill="currentColor" id="play-icon"><polygon points="10,8 16,12 10,16"/></svg></button>
        <button id="next-btn" class="ctrl-btn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" fill="currentColor"/></svg></button>
      </div>
      <div class="player-seek-row">
        <span id="time-current" class="time">0:00</span>
        <input type="range" id="seek" class="seek" min="0" max="1000" value="0">
        <span id="time-total" class="time">0:00</span>
      </div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
