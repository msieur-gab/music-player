<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Soniq Takeaway</title>
  <meta name="theme-color" content="#111">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111;
      --bg-card: #1a1a1a;
      --bg-hover: #222;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #e8621a;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      padding: 24px 16px 12px;
      text-align: center;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    header .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .accent { color: var(--accent); }

    /* Status + progress */
    #status {
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }
    #status.downloading { color: var(--accent); }
    #status.ready { color: #4caf50; }
    #status.error { color: #ef5350; }

    #progress-bar {
      height: 3px;
      background: var(--bg-card);
      margin: 0 16px;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    #progress-bar.active { display: block; }
    #progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 200ms;
      border-radius: 2px;
    }

    /* Track list */
    #track-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
    }
    .track {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius);
    }

    .track-num {
      font-size: 13px;
      color: var(--text-muted);
      min-width: 20px;
      text-align: right;
    }

    .track-info { flex: 1; min-width: 0; }
    .track-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-artist {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-status { font-size: 11px; color: var(--text-muted); }
    .track-status.cached { color: #4caf50; }
    .track-status.dl { color: var(--accent); }

    /* Action buttons */
    .actions {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 150ms;
    }
    .btn:active { opacity: 0.85; }
    .btn svg {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-primary svg { fill: currentColor; stroke: none; }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid #333;
    }
    .btn-secondary svg {
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .hidden { display: none !important; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Soniq <span class="accent">Takeaway</span></h1>
    <div class="sub" id="basket-info"></div>
  </header>

  <div id="status">Connecting...</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="track-list"></div>

  <div class="actions">
    <button class="btn btn-primary hidden" id="save-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Save all to device
    </button>
    <a class="btn btn-secondary hidden" id="player-link" href="https://soniq-miniplayer.netlify.app/" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Open Soniq MiniPlayer
    </a>
  </div>

  <script src="app.js"></script>
</body>
</html>
