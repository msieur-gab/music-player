<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusiCast Addon SDK — Test Harness</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    .shell {
      flex: 1;
      display: grid;
      grid-template-columns: 56px 1fr 0px;
      grid-template-rows: 1fr;
      grid-template-areas: "rail feed detail";
      overflow: hidden;
      transition: grid-template-columns 400ms cubic-bezier(0.32, 0.72, 0, 1);
    }
    .shell.detail-open {
      grid-template-columns: 56px 1fr 420px;
    }

    /* Rail */
    .rail {
      grid-area: rail;
      background: var(--bg-raised);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 4px;
    }
    .rail button {
      width: 40px; height: 40px;
      border: none; background: none;
      color: var(--text-muted);
      cursor: pointer; border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      transition: all 160ms ease;
    }
    .rail button:hover { color: var(--text); background: var(--bg-hover); }
    .rail button.active { color: var(--accent); background: var(--accent-light); }
    .rail button svg {
      width: 20px; height: 20px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .rail .spacer { flex: 1; }
    .rail .label {
      font-size: 8px; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-top: 12px; margin-bottom: 4px;
    }

    /* Feed (addon goes here) */
    .feed {
      grid-area: feed;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Detail panel */
    .detail {
      grid-area: detail;
      border-left: 1px solid var(--border);
      background: var(--bg);
      overflow-y: auto;
      padding: 16px;
      min-width: 0;
    }
    .detail-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }
    .detail-back {
      border: none; background: none; color: var(--text-muted);
      cursor: pointer; font-size: 18px; padding: 4px;
    }
    .detail-back:hover { color: var(--text); }
    .detail-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .detail-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
    .track-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; font-size: 13px;
      transition: background 160ms ease;
    }
    .track-row:hover { background: var(--bg-hover); }
    .track-row.playing { color: var(--accent); }
    .track-num { width: 24px; text-align: right; color: var(--text-faint); font-size: 12px; }
    .track-info { flex: 1; min-width: 0; }
    .track-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 11px; color: var(--text-muted); }

    /* Player bar */
    .player-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      background: var(--player-bg);
      color: var(--player-text);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .player-bar button {
      background: none; border: none;
      color: var(--player-muted); cursor: pointer;
      font-size: 16px; padding: 4px;
    }
    .player-bar button:hover { color: var(--player-text); }
    .player-bar .play-btn { font-size: 22px; }
    .player-info { flex: 1; font-size: 13px; color: var(--player-muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .player-info.on { color: var(--player-text); }

    /* Status bar */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 16px;
      background: var(--bg-raised);
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-faint);
    }
    .status-bar .badge {
      padding: 2px 8px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 4px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="shell" id="shell">
  <div class="rail">
    <button class="active" id="addon-tab" title="Your Addon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    </button>
    <span class="spacer"></span>
    <span class="label">SDK</span>
    <button id="theme-toggle" title="Toggle theme">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>

  <div class="feed" id="feed">
    <!-- Your addon component renders here -->
    <div id="placeholder" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-size:14px;">
      Loading addon...
    </div>
  </div>

  <div class="detail" id="detail" style="display:none;">
    <div class="detail-header">
      <button class="detail-back" id="detail-back">&larr;</button>
      <span class="detail-title" id="detail-title"></span>
    </div>
    <div class="detail-desc" id="detail-desc"></div>
    <div id="detail-tracks"></div>
  </div>
</div>

<div class="player-bar">
  <button id="prev-btn">&#9198;</button>
  <button class="play-btn" id="play-btn">&#9654;</button>
  <button id="next-btn">&#9197;</button>
  <div class="player-info" id="player-info">MusiCast SDK — drop your addon in</div>
</div>

<div class="status-bar">
  <span id="track-count">No tracks loaded</span>
  <span class="badge">SDK Mode</span>
</div>

<script type="module">
  // ── SDK Test Harness ──
  // Loads your addon component, provides mock data, wires events.

  const params = new URLSearchParams(location.search);
  const addonId = params.get('addon') || 'sonic-sunburst';
  const useMock = params.has('mock');

  // ── Theme toggle ──
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  });

  // ── Load addon manifest + component ──
  let manifest = null;
  try {
    const r = await fetch(`/addons/${addonId}/manifest.json`);
    manifest = await r.json();
  } catch {
    document.getElementById('placeholder').textContent = `Could not load addon: ${addonId}`;
    throw new Error(`Addon ${addonId} not found`);
  }

  const componentTag = manifest.ui?.component || addonId;
  const entry = manifest.ui?.entry || `ui/${addonId}.js`;

  // Load the component script
  await import(`/addons/${addonId}/${entry}`);

  // Create and mount the component
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  const addon = document.createElement(componentTag);
  addon.style.flex = '1';
  addon.style.minHeight = '0';
  feed.appendChild(addon);

  // ── Mock TrackStore (if no server) ──
  if (useMock) {
    // Override the track-store module with mock data
    const mockData = await fetch('/addons/sdk/mock-tracks.json').then(r => r.json());
    document.getElementById('track-count').textContent = `${mockData.length} mock tracks`;

    // Intercept fetch calls to /api/tracks
    const origFetch = window.fetch;
    window.fetch = function(url, ...args) {
      if (typeof url === 'string' && url.includes('/api/tracks')) {
        return Promise.resolve(new Response(JSON.stringify({ tracks: mockData }), {
          headers: { 'Content-Type': 'application/json' },
        }));
      }
      if (typeof url === 'string' && url.includes('/api/library')) {
        return Promise.resolve(new Response(JSON.stringify([]), {
          headers: { 'Content-Type': 'application/json' },
        }));
      }
      return origFetch.call(this, url, ...args);
    };
  }

  // ── Detail panel (track list) ──
  const shell = document.getElementById('shell');
  const detailEl = document.getElementById('detail');
  let currentPlaylist = [];
  let playingIndex = -1;

  document.getElementById('detail-back').addEventListener('click', () => {
    shell.classList.remove('detail-open');
    detailEl.style.display = 'none';
  });

  function showDetail(label, desc, tracks) {
    currentPlaylist = tracks;
    document.getElementById('detail-title').textContent = label;
    document.getElementById('detail-desc').textContent = desc;
    renderTracks(tracks);
    detailEl.style.display = '';
    shell.classList.add('detail-open');
  }

  function renderTracks(tracks) {
    const container = document.getElementById('detail-tracks');
    container.innerHTML = tracks.map((t, i) => `
      <div class="track-row${i === playingIndex ? ' playing' : ''}" data-idx="${i}">
        <span class="track-num">${i + 1}</span>
        <div class="track-info">
          <div class="track-name">${t.title}</div>
          <div class="track-artist">${t.artist}</div>
        </div>
      </div>
    `).join('');

    container.querySelectorAll('.track-row').forEach(row => {
      row.addEventListener('click', () => {
        playTrack(currentPlaylist, parseInt(row.dataset.idx));
      });
    });
  }

  // ── Playback (simplified for SDK) ──
  const audio = new Audio();
  const playerInfo = document.getElementById('player-info');
  const playBtn = document.getElementById('play-btn');

  function playTrack(tracks, index) {
    if (index < 0 || index >= tracks.length) return;
    currentPlaylist = tracks;
    playingIndex = index;
    const t = tracks[index];

    if (!useMock && t.url) {
      audio.src = t.url;
      audio.play().catch(() => {});
    }

    playerInfo.textContent = `${t.title} — ${t.artist}`;
    playerInfo.className = 'player-info on';
    playBtn.textContent = '\u23F8';
    renderTracks(tracks);
  }

  audio.addEventListener('ended', () => {
    if (playingIndex < currentPlaylist.length - 1) {
      playTrack(currentPlaylist, playingIndex + 1);
    }
  });

  playBtn.addEventListener('click', () => {
    if (audio.paused) { audio.play().catch(() => {}); playBtn.textContent = '\u23F8'; }
    else { audio.pause(); playBtn.textContent = '\u25B6'; }
  });

  document.getElementById('prev-btn').addEventListener('click', () => {
    if (playingIndex > 0) playTrack(currentPlaylist, playingIndex - 1);
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    if (playingIndex < currentPlaylist.length - 1) playTrack(currentPlaylist, playingIndex + 1);
  });

  // ── Wire addon events ──
  addon.addEventListener('addon-playlist', (e) => {
    showDetail(e.detail.label, e.detail.desc, e.detail.tracks);
  });

  addon.addEventListener('addon-play', (e) => {
    playTrack(e.detail.tracks, e.detail.index);
  });

  // ── Status ──
  if (!useMock) {
    try {
      const r = await fetch('/api/tracks?per_page=1');
      const data = await r.json();
      document.getElementById('track-count').textContent = `${data.total || '?'} tracks (live)`;
    } catch {
      document.getElementById('track-count').textContent = 'Server not reachable';
    }
  }
</script>
</body>
</html>
